<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OMNI - Ultimate Core</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-twilight.min.css" rel="stylesheet" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>

    <style>
        /* MINIMALIST DARK THEME */
        :root { --bg-dark: #050505; --surface: #121212; --primary: #00ffcc; --text: #e0e0e0; --accent: #00b38f; --danger: #ff3366; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg-dark); color: var(--text); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        /* HEADER */
        .header { background: rgba(5, 5, 5, 0.9); backdrop-filter: blur(20px); padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #222; z-index: 100; }
        .logo-area { display: flex; align-items: center; gap: 15px; }
        .logo-area i { font-size: 1.8rem; color: var(--primary); text-shadow: 0 0 15px var(--primary); }
        .logo-area h2 { font-family: 'JetBrains Mono', monospace; font-weight: 700; font-size: 1.4rem; letter-spacing: 1px; margin: 0;}
        .agi-badge { background: transparent; border: 1px solid var(--primary); color: var(--primary); font-size: 0.65rem; font-family: 'JetBrains Mono', monospace; padding: 3px 8px; border-radius: 2px; text-transform: uppercase; margin-left: 10px; }

        /* Full Screen Chat Area */
        .chat-container { flex: 1; overflow-y: auto; padding: 2rem 2rem 8rem 2rem; display: flex; flex-direction: column; gap: 2rem; scroll-behavior: smooth; }
        
        .message { display: flex; gap: 1.5rem; max-width: 900px; width: 100%; margin: 0 auto; animation: slideUp 0.3s ease-out; }
        .message.user { flex-direction: row-reverse; }
        
        .avatar { width: 38px; height: 38px; border-radius: 8px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 1.1rem; font-family: 'JetBrains Mono', monospace; font-weight: bold; }
        .ai .avatar { background: rgba(0, 255, 204, 0.1); color: var(--primary); border: 1px solid var(--primary); box-shadow: 0 0 10px rgba(0, 255, 204, 0.2); }
        .user .avatar { background: #1e1e1e; color: #fff; border: 1px solid #333; }

        .bubble { flex: 1; min-width: 0; }
        .bubble .content { font-size: 1.05rem; line-height: 1.7; word-wrap: break-word; font-weight: 300; }
        
        /* Markdown Styling */
        .content img { max-width: 100%; border-radius: 12px; margin-top: 10px; border: 2px solid #333; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
        .content pre { background: var(--surface); padding: 1.2rem; border-radius: 8px; overflow-x: auto; margin: 15px 0; border: 1px solid #222; }
        .content code { font-family: 'JetBrains Mono', monospace; font-size: 0.85rem; color: var(--primary); }
        
        /* Floating Input Area */
        .input-area { position: fixed; bottom: 0; width: 100%; background: linear-gradient(transparent, #050505 70%); padding: 2rem; pointer-events: none; }
        .input-box { max-width: 900px; margin: 0 auto; background: rgba(18, 18, 18, 0.9); backdrop-filter: blur(15px); border: 1px solid #333; border-radius: 20px; display: flex; align-items: flex-end; padding: 10px 20px; gap: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.8); pointer-events: auto; transition: 0.3s; }
        .input-box:focus-within { border-color: rgba(0, 255, 204, 0.5); box-shadow: 0 0 25px rgba(0, 255, 204, 0.1); }
        
        textarea { flex: 1; background: transparent; border: none; color: white; padding: 12px 0; font-size: 1.05rem; resize: none; outline: none; min-height: 48px; max-height: 150px; line-height: 1.5; }
        textarea::placeholder { color: #666; font-family: 'JetBrains Mono', monospace; font-size: 0.9rem; }
        
        .icon-btn { background: transparent; border: none; color: #777; font-size: 1.2rem; cursor: pointer; transition: 0.2s; padding: 10px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
        .icon-btn:hover { color: var(--primary); background: rgba(0, 255, 204, 0.1); }
        
        .send-btn { background: var(--primary); border: none; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; transition: 0.2s; color: #000; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; flex-shrink: 0; }
        .send-btn:hover { background: #fff; box-shadow: 0 0 15px var(--primary); transform: scale(1.05); }
        .send-btn:disabled { background: #333; color: #666; cursor: not-allowed; box-shadow: none; transform: none; }

        .header-actions { display: flex; gap: 15px; }

        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg-dark); }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--primary); }
    </style>
</head>
<body>

    <header class="header">
        <div class="logo-area">
            <i class="fas fa-network-wired"></i>
            <h2>OMNI <span class="agi-badge">All-Rounder AI</span></h2>
        </div>
        <div class="header-actions">
            <button class="icon-btn" onclick="clearMemory()" title="Clear Chat History" style="color:var(--danger)">
                <i class="fas fa-trash-alt"></i>
            </button>
        </div>
    </header>

    <div class="chat-container" id="chatCore"></div>

    <div class="input-area">
        <div class="input-box">
            <textarea id="promptInput" placeholder="Ask anything... (or type /imagine for HD photos)" oninput="this.style.height = '';this.style.height = this.scrollHeight + 'px'"></textarea>
            
            <button id="sendBtn" class="send-btn" onclick="askAI()">
                <i class="fas fa-paper-plane"></i>
            </button>
        </div>
    </div>

    <script>
        // SMART AND HELPFUL SYSTEM PROMPT
        const SYSTEM_PROMPT = `You are OMNI, an extremely intelligent, friendly, and helpful AI assistant.
        Directives:
        1. You are excellent at normal tasks: answering general knowledge questions, writing code, summarizing topics, and casual chat.
        2. Speak naturally and clearly. Be a helpful companion.
        3. Understand and reply perfectly in a mix of Hindi and English (Hinglish) if the user communicates in it.
        4. Format your responses using Markdown (bullet points, bold text, code blocks) to keep them easy to read.`;

        let chatMemory = [];

        window.onload = () => {
            // Load Chat History
            const savedMemory = localStorage.getItem('omni_final_memory');
            if (savedMemory) {
                chatMemory = JSON.parse(savedMemory);
                chatMemory.forEach(msg => {
                    if (msg.role !== 'system') {
                        addMessage(msg.role, msg.content, false); 
                    }
                });
                scrollToBottom();
            } else {
                // First Time Greeting
                chatMemory = [{ role: "system", content: SYSTEM_PROMPT }];
                const welcomeMsg = "Hello! Main **OMNI** hoon. Sab system perfectly online hain aur history save ho rahi hai.\n\n* **Normal Chat:** Aap mujhse coding, padhai, ya koi bhi general sawal pooch sakte hain.\n* **Images:** Agar real photo chahiye, toh bas type karein `/imagine` aur apna prompt (jaise: `/imagine a flying car`).";
                addMessage('ai', welcomeMsg);
                chatMemory.push({ role: "assistant", content: welcomeMsg });
                saveMemory();
            }
        };

        function saveMemory() {
            localStorage.setItem('omni_final_memory', JSON.stringify(chatMemory));
        }

        function clearMemory() {
            if(confirm("Kya aap saari chat history delete karna chahte hain?")) {
                localStorage.removeItem('omni_final_memory');
                location.reload();
            }
        }

        function addMessage(role, text, scroll = true) {
            const core = document.getElementById('chatCore');
            const div = document.createElement('div');
            div.className = `message ${role}`;
            
            let htmlContent = marked.parse(text);

            div.innerHTML = `
                <div class="avatar">${role === 'user' ? 'U' : 'Ω'}</div>
                <div class="bubble"><div class="content">${htmlContent}</div></div>
            `;
            core.appendChild(div);
            Prism.highlightAllUnder(div);
            
            if(scroll) scrollToBottom();
        }

        function scrollToBottom() {
            const core = document.getElementById('chatCore');
            core.scrollTop = core.scrollHeight;
        }

        async function askAI() {
            const input = document.getElementById('promptInput');
            const btn = document.getElementById('sendBtn');
            let query = input.value.trim();
            
            if(!query) return;

            input.value = "";
            input.style.height = 'auto'; 
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-circle-notch fa-spin"></i>';

            addMessage('user', query);
            chatMemory.push({ role: "user", content: query });
            saveMemory();

            // 🎨 IMAGE GENERATION (FLUX ENGINE WITH SECRET KEYWORDS)
            if (query.toLowerCase().startsWith('/imagine ')) {
                const userPrompt = query.substring(9).trim(); 
                
                const hyperRealPrompt = userPrompt + ", ultra realistic, 8k resolution, cinematic lighting, masterpiece, high quality photography";
                const safePrompt = encodeURIComponent(hyperRealPrompt);
                
                const imageUrl = `https://image.pollinations.ai/prompt/${safePrompt}?width=1024&height=1024&nologo=true&model=flux`;
                
                const replyText = `Here is your image for: **${userPrompt}**\n\n![Generated Image](${imageUrl})`;
                
                setTimeout(() => {
                    addMessage('ai', replyText);
                    chatMemory.push({ role: "assistant", content: replyText });
                    saveMemory();
                    
                    btn.disabled = false;
                    btn.innerHTML = '<i class="fas fa-paper-plane"></i>';
                    input.focus();
                }, 1500); 
                return;
            }

            // 🧠 TEXT GENERATION (GENERAL KNOWLEDGE, CHAT, CODE)
            try {
                const response = await fetch('https://text.pollinations.ai/', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        messages: chatMemory // Complete history is sent
                    })
                });

                if(!response.ok) throw new Error("Connection failed.");

                const reply = await response.text(); 
                addMessage('ai', reply);
                
                chatMemory.push({ role: "assistant", content: reply });
                saveMemory(); 

            } catch(e) {
                addMessage('ai', "SYSTEM EXCEPTION: " + e.message);
                chatMemory.pop(); 
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-paper-plane"></i>';
                input.focus();
            }
        }

        document.getElementById('promptInput').addEventListener('keydown', e => {
            if(e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); askAI(); }
        });
    </script>
</body>
</html>
