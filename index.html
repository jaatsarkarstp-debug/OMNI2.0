<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OMNI - Multi-Chat Core</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-twilight.min.css" rel="stylesheet" />

    <style>
        /* MINIMALIST DARK THEME */
        :root { --bg-dark: #050505; --surface: #121212; --sidebar-bg: #0a0a0a; --primary: #00ffcc; --text: #e0e0e0; --accent: #00b38f; --danger: #ff3366; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg-dark); color: var(--text); height: 100vh; display: flex; overflow: hidden; }
        
        /* SIDEBAR (HISTORY / CHATS) */
        .sidebar { width: 280px; background: var(--sidebar-bg); border-right: 1px solid #222; display: flex; flex-direction: column; transition: transform 0.3s ease; z-index: 200; }
        .sidebar-header { padding: 1.5rem; border-bottom: 1px solid #222; display: flex; align-items: center; justify-content: space-between; }
        .new-chat-btn { width: 100%; background: transparent; border: 1px solid var(--primary); color: var(--primary); padding: 10px; border-radius: 8px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; font-weight: 600; transition: 0.2s; }
        .new-chat-btn:hover { background: rgba(0, 255, 204, 0.1); }
        .chat-list { flex: 1; overflow-y: auto; padding: 1rem; display: flex; flex-direction: column; gap: 5px; }
        .chat-item { padding: 12px; background: transparent; border-radius: 8px; cursor: pointer; display: flex; align-items: center; gap: 10px; color: #aaa; transition: 0.2s; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; border: 1px solid transparent; }
        .chat-item:hover { background: #1a1a1a; color: #fff; }
        .chat-item.active { background: rgba(0, 255, 204, 0.1); border-color: rgba(0, 255, 204, 0.3); color: var(--primary); }
        
        /* MAIN CONTENT AREA */
        .main-content { flex: 1; display: flex; flex-direction: column; position: relative; }
        
        /* HEADER */
        .header { background: rgba(5, 5, 5, 0.9); backdrop-filter: blur(20px); padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #222; z-index: 100; }
        .logo-area { display: flex; align-items: center; gap: 15px; }
        .menu-btn { background: transparent; border: none; color: #fff; font-size: 1.5rem; cursor: pointer; display: none; }
        .logo-area h2 { font-family: 'JetBrains Mono', monospace; font-weight: 700; font-size: 1.4rem; letter-spacing: 1px; margin: 0; color: #fff;}
        
        /* Full Screen Chat Area */
        .chat-container { flex: 1; overflow-y: auto; padding: 2rem 2rem 8rem 2rem; display: flex; flex-direction: column; gap: 2rem; scroll-behavior: smooth; }
        .message { display: flex; gap: 1.5rem; max-width: 900px; width: 100%; margin: 0 auto; animation: slideUp 0.3s ease-out; }
        .message.user { flex-direction: row-reverse; }
