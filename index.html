<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OMNI AGI - Core V2</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-twilight.min.css" rel="stylesheet" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>

    <style>
        /* MINIMALIST DARK THEME */
        :root { --bg-dark: #050505; --surface: #121212; --primary: #00ffcc; --text: #e0e0e0; --accent: #00b38f; --danger: #ff3366; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg-dark); color: var(--text); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        /* Full Screen Chat Area */
        .chat-container { flex: 1; overflow-y: auto; padding: 2rem 2rem 8rem 2rem; display: flex; flex-direction: column; gap: 2rem; scroll-behavior: smooth; }
        
        .message { display: flex; gap: 1.5rem; max-width: 900px; width: 100%; margin: 0 auto; animation: slideUp 0.3s ease-out; }
        .message.user { flex-direction: row-reverse; }
        
        .avatar { width: 38px; height: 38px; border-radius: 8px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 1.1rem; font-family: 'JetBrains Mono', monospace; font-weight: bold; }
        .ai .avatar { background: rgba(0, 255, 204, 0.1); color: var(--primary); border: 1px solid var(--primary); box-shadow: 0 0 10px rgba(0, 255, 204, 0.2); }
        .user .avatar { background: #1e1e1e; color: #fff; border: 1px solid #333; }

        .bubble { flex: 1; min-width: 0; }
        .bubble .content { font-size: 1.05rem; line-height: 1.7; word-wrap: break-word; font-weight: 300; }
        
        /* Markdown Image Styling (Generated Images) */
        .content img { max-width: 100%; border-radius: 12px; margin-top: 10px; border: 2px solid #333; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
        
        .content pre { background: var(--surface); padding: 1.2rem; border-radius: 8px; overflow-x: auto; margin: 15px 0; border: 1px solid #222; }
        .content code { font-family: 'JetBrains Mono', monospace; font-size: 0.85rem; color: var(--primary); }
        
        /* Floating Glassmorphism Input Area */
        .input-area { position: fixed; bottom: 0; width: 100%; background: linear-gradient(transparent, #050505 70%); padding: 2rem; pointer-events: none; }
        .input-box { max-width: 900px; margin: 0 auto; background: rgba(18, 18, 18, 0.8); backdrop-filter: blur(15px); border: 1px solid #333; border-radius: 20px; display: flex; align-items: flex-end; padding: 10px 20px; gap: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.8); pointer-events: auto; transition: 0.3s; }
        .input-box:focus-within { border-color: rgba(0, 255, 204, 0.5); box-shadow: 0 0 25px rgba(0, 255, 204, 0.1); }
        
        textarea { flex: 1; background: transparent; border: none; color: white; padding: 12px 0; font-size: 1.05rem; resize: none; outline: none; min-height: 48px; max-height: 150px; line-height: 1.5; }
        textarea::placeholder { color: #666; font-family: 'JetBrains Mono', monospace; font-size: 0.9rem; }
        
        .icon-btn { background: transparent; border: none; color: #777; font-size: 1.2rem; cursor: pointer; transition: 0.2s; padding: 10px; border-radius: 50%; height: 45px; width: 45px; display: flex; align-items: center; justify-content: center; }
        .icon-btn:hover { color: var(--primary); background: rgba(0, 255, 204, 0.1); }
        .icon-btn.recording { color: var(--danger); animation: pulse 1s infinite; }
        
        .send-btn { background: var(--primary); border: none; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; transition: 0.2s; color: #000; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; }
        .send-btn:hover { background: #fff; box-shadow: 0 0 15px var(--primary); transform: scale(1.05); }
        .send-btn:disabled { background: #333; color: #666; cursor: not-allowed; box-shadow: none; transform: none; }

        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes pulse { 0% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.1); opacity: 0.8; } 100% { transform: scale(1); opacity: 1; } }
        
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg-dark); }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--primary); }
    </style>
</head>
<body>
    <div class="chat-container" id="chatCore"></div>

    <div class="input-area">
        <div class="input-box">
            <button class="icon-btn" id="micBtn" onclick="toggleSpeechRecognition()" title="Audio Input">
                <i class="fas fa-microphone"></i>
            </button>
            <button class="icon-btn" onclick="clearMemory()" title="Erase Chat History" style="color:var(--danger)">
                <i class="fas fa-trash-alt"></i>
            </button>
            
            <textarea id="promptInput" placeholder="Command OMNI... (Type /imagine for images)" oninput="this.style.height = '';this.style.height = this.scrollHeight + 'px'"></textarea>
            
            <button id="sendBtn" class="send-btn" onclick="askAI()">
                <i class="fas fa-paper-plane"></i>
            </button>
        </div>
    </div>

    <script>
        const SYSTEM_PROMPT = `You are OMNI, an advanced AGI Core. 
        Directives:
        1. Be highly analytical, structured, and objective. Do not use informal titles.
        2. Understand Hinglish perfectly. Use Markdown for code and text formatting.
        3. The user can generate images by typing "/imagine". Acknowledge this capability if asked.`;

        let chatMemory = [];

        // --- LOCALSTORAGE: LOAD HISTORY ON BOOT ---
        window.onload = () => {
            const savedMemory = localStorage.getItem('omni_v2_memory');
            if (savedMemory) {
                // If history exists, load it
                chatMemory = JSON.parse(savedMemory);
                chatMemory.forEach(msg => {
                    if (msg.role !== 'system') {
                        addMessage(msg.role, msg.content, false); // false = don't scroll wildly during load
                    }
                });
                scrollToBottom();
            } else {
                // First time boot
                chatMemory = [{ role: "system", content: SYSTEM_PROMPT }];
                const welcomeMsg = "Neural network established. I am **OMNI**. Header disabled. Memory modules active.\n\n* To chat: Just type your query.\n* To generate an image: Type `/imagine` followed by your prompt (e.g., `/imagine a cyberpunk city`).\n* To clear memory: Click the red trash icon.";
                addMessage('ai', welcomeMsg);
                chatMemory.push({ role: "assistant", content: welcomeMsg });
                saveMemory();
            }
        };

        function saveMemory() {
            localStorage.setItem('omni_v2_memory', JSON.stringify(chatMemory));
        }

        function clearMemory() {
            if(confirm("Are you sure you want to erase all memories? This cannot be undone.")) {
                localStorage.removeItem('omni_v2_memory');
                location.reload();
            }
        }

        // --- ADVANCED MIC MODULE ---
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        let recognition = null;
        if(SpeechRecognition) {
            recognition = new SpeechRecognition();
            recognition.continuous = false;
            recognition.interimResults = false;
            
            recognition.onresult = (event) => {
                const transcript = event.results[0][0].transcript;
                document.getElementById('promptInput').value += transcript + " ";
                document.getElementById('micBtn').classList.remove('recording');
            };
            
            recognition.onerror = (event) => {
                document.getElementById('micBtn').classList.remove('recording');
                console.error("Mic Error:", event.error);
            };
            recognition.onend = () => document.getElementById('micBtn').classList.remove('recording');
        }

        function toggleSpeechRecognition() {
            if(!recognition) return alert("Browser does not support Voice Input.");
            const micBtn = document.getElementById('micBtn');
            if(micBtn.classList.contains('recording')) {
                recognition.stop();
            } else {
                recognition.start();
                micBtn.classList.add('recording');
            }
        }

        // --- UI RENDERING ---
        function addMessage(role, text, scroll = true) {
            const core = document.getElementById('chatCore');
            const div = document.createElement('div');
            div.className = `message ${role}`;
            
            let htmlContent = marked.parse(text);

            div.innerHTML = `
                <div class="avatar">${role === 'user' ? 'U' : 'Ω'}</div>
                <div class="bubble"><div class="content">${htmlContent}</div></div>
            `;
            core.appendChild(div);
            Prism.highlightAllUnder(div);
            
            if(scroll) scrollToBottom();
        }

        function scrollToBottom() {
            const core = document.getElementById('chatCore');
            core.scrollTop = core.scrollHeight;
        }

        // --- CORE AI & IMAGE ENGINE ---
        async function askAI() {
            const input = document.getElementById('promptInput');
            const btn = document.getElementById('sendBtn');
            let query = input.value.trim();
            
            if(!query) return;

            input.value = "";
            input.style.height = 'auto'; 
            btn.disabled = true;
            btn.innerHTML = '<i class="fas fa-circle-notch fa-spin"></i>';

            addMessage('user', query);
            chatMemory.push({ role: "user", content: query });
            saveMemory();

            // 🎨 IMAGE GENERATION BYPASS
            if (query.toLowerCase().startsWith('/imagine ')) {
                const imagePrompt = query.substring(9).trim(); // Extract prompt after "/imagine "
                const safePrompt = encodeURIComponent(imagePrompt);
                
                // Uses Pollinations free image API
                const imageUrl = `https://image.pollinations.ai/prompt/${safePrompt}?width=1024&height=1024&nologo=true`;
                
                // Format response as Markdown image
                const replyText = `Image generated for: **${imagePrompt}**\n\n![Generated Image](${imageUrl})`;
                
                setTimeout(() => {
                    addMessage('ai', replyText);
                    chatMemory.push({ role: "assistant", content: replyText });
                    saveMemory();
                    
                    btn.disabled = false;
                    btn.innerHTML = '<i class="fas fa-paper-plane"></i>';
                    input.focus();
                }, 1000); // Small delay to simulate processing
                return;
            }

            // 🧠 TEXT GENERATION BYPASS
            try {
                const response = await fetch('https://text.pollinations.ai/', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        messages: chatMemory // Sends full history
                    })
                });

                if(!response.ok) throw new Error("Network bypass failed.");

                const reply = await response.text(); 
                addMessage('ai', reply);
                
                chatMemory.push({ role: "assistant", content: reply });
                saveMemory(); // Save updated chat to browser

            } catch(e) {
                addMessage('ai', "SYSTEM EXCEPTION: " + e.message);
                chatMemory.pop(); // Remove failed user message from memory
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-paper-plane"></i>';
                input.focus();
            }
        }

        document.getElementById('promptInput').addEventListener('keydown', e => {
            if(e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); askAI(); }
        });
    </script>
</body>
</html>
